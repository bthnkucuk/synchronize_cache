name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.9"
  # Opt every JavaScript action into Node.js 24 ahead of GitHub's forced
  # rollout (June 2026). Removes the deprecation banner now and avoids
  # surprises when older actions get auto-upgraded.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: offline_first_sync_drift
            test_cmd: flutter test --coverage
            coverage: true
            codegen_dir: ""
          - package: offline_first_sync_drift_rest
            test_cmd: flutter test
            coverage: false
            codegen_dir: packages/offline_first_sync_drift_rest
          - package: search_engine
            test_cmd: dart test
            coverage: false
            codegen_dir: packages/search_engine
          - package: sync_socket_wake_listener
            test_cmd: flutter test
            coverage: false
            codegen_dir: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub-cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.yaml', '**/pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-

      - name: Install workspace dependencies
        run: flutter pub get

      - name: Generate code
        if: matrix.codegen_dir != ''
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: ${{ matrix.codegen_dir }}

      - name: Run tests
        run: ${{ matrix.test_cmd }}
        working-directory: packages/${{ matrix.package }}

      - name: Filter coverage (strip drift-generated files)
        if: matrix.coverage
        run: |
          grep -v '\.drift\.dart' coverage/lcov.info > coverage/lcov-filtered.info || true
          mv coverage/lcov-filtered.info coverage/lcov.info
        working-directory: packages/${{ matrix.package }}

      - name: Upload coverage artifact
        if: matrix.coverage
        uses: actions/upload-artifact@v7
        with:
          name: lcov-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage/lcov.info
          retention-days: 7

  lint-and-example:
    name: Lint + example app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub-cache
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.yaml', '**/pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-

      - name: Install workspace dependencies
        run: flutter pub get

      - name: Generate code (example apps)
        run: |
          set -euo pipefail
          for dir in \
            example \
            example/todo_simple/frontend \
            example/todo_simple/backend \
            example/todo_advanced/frontend \
            example/todo_advanced/backend \
            example/todo_simple_new/frontend \
            example/todo_simple_new/backend; do
            echo "::group::build_runner in $dir"
            (cd "$dir" && dart run build_runner build --delete-conflicting-outputs)
            echo "::endgroup::"
          done

      - name: Generate code (offline_first_sync_drift_rest)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: packages/offline_first_sync_drift_rest

      - name: Lint (dart analyze)
        run: dart analyze . --no-fatal-warnings

      - name: Test example app
        run: flutter test
        working-directory: example

  coverage:
    name: Coverage badge & Codecov
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      # Declared at job level so linters can resolve ${{ env.COVERAGE_PERCENT }}
      # in the commit step. The actual value is written into GITHUB_ENV by the
      # "Update coverage badge" step.
      COVERAGE_PERCENT: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: lcov-offline_first_sync_drift
          path: packages/offline_first_sync_drift/coverage

      - name: Update coverage badge
        run: |
          LCOV_INFO="packages/offline_first_sync_drift/coverage/lcov.info"

          total_lines=$(grep -o "LF:[0-9]*" "$LCOV_INFO" | cut -d: -f2 | awk '{s+=$1} END {print s}')
          covered_lines=$(grep -o "LH:[0-9]*" "$LCOV_INFO" | cut -d: -f2 | awk '{s+=$1} END {print s}')

          if [ -z "$total_lines" ] || [ "$total_lines" -eq 0 ]; then
            percent=0
          else
            percent=$(awk "BEGIN {printf \"%.1f\", $covered_lines * 100 / $total_lines}")
          fi

          echo "Coverage: $percent%"

          if (( $(echo "$percent < 50" | bc -l) )); then
            color="red"
          elif (( $(echo "$percent < 80" | bc -l) )); then
            color="yellow"
          else
            color="brightgreen"
          fi

          new_badge="![coverage](https://img.shields.io/badge/coverage-${percent}%25-${color})"
          sed -i "s|^!\[coverage\].*|$new_badge|" README.md
          sed -i "s|^!\[coverage\].*|$new_badge|" README.ru.md

          echo "COVERAGE_PERCENT=$percent" >> $GITHUB_ENV

      - name: Commit coverage badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.ru.md
          git diff --staged --quiet || git commit -m "chore: update coverage badge to ${{ env.COVERAGE_PERCENT }}%"
          git push

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: packages/offline_first_sync_drift/coverage/lcov.info
          flags: offline_first_sync_drift
          fail_ci_if_error: false
