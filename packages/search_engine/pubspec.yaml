name: search_engine
description: >
  Drift-backed full-text search engine with FTS5 indexing, pending queue,
  cursor-based incremental indexing, and a swappable transport layer.
version: 0.1.0
repository: https://github.com/cherrypick-agency/synchronize_cache
issue_tracker: https://github.com/cherrypick-agency/synchronize_cache/issues
resolution: workspace

topics:
  - drift
  - fts5
  - search
  - sqlite

environment:
  sdk: ^3.7.0

dependencies:
  drift: ^2.33.0
  equatable: ^2.0.8
  rxdart: ^0.28.0
  synchronized: ^3.4.0+1

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  fake_async: ^1.3.3
  mocktail: ^1.0.5
  test: ^1.31.0
