name: drift_helpers
description: Small pure-Dart helpers (drift converters, etc.) reused across apps.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.7.0

dependencies:
  drift: ^2.33.0
  meta: ^1.18.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
  # Pure-Dart sqlite bindings — used only by test/dao/converter_dao_smoke_test.dart
  # to round-trip drift_helpers' TypeConverters through a real sqlite engine.
  # sqlite3 3.x bundles the native library via build hooks, so no
  # sqlite3_flutter_libs is required on Flutter platforms either.
  sqlite3: ^3.3.1
